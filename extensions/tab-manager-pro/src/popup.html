<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Manager Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🗂️ Tab Manager Pro</h1>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search tabs...">
      </div>
      <div class="stats">
        <span id="tabCount">0 tabs</span>
      </div>
    </header>

    <div class="actions">
      <button id="closeDuplicates" class="btn btn-secondary">Close Duplicates</button>
      <button id="closeRight" class="btn btn-secondary">Close Tabs to Right</button>
      <button id="groupTabs" class="btn btn-primary">Group by Domain</button>
    </div>

    <div class="tabs-list" id="tabsList">
      <!-- Tabs will be populated here -->
    </div>

    <footer>
      <button id="refreshTabs" class="btn btn-full">🔄 Refresh</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
